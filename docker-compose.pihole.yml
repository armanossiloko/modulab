# https://docs.pi-hole.net/docker/
# Network DNS ad blocker — standalone stack (not Postgres / not modulab-db).
# cp .env.pihole.example via scripts/setup.sh
# bash scripts/start.sh pihole
# Admin: http://127.0.0.1:5080/admin
# DNS (loopback): 127.0.0.1:53 — on a Pi, use docker-compose.override.yml to bind 53:53 for LAN
# Local names (jellyfin.network.lan → host IP): see pihole/LOCAL-DNS.md

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:${PIHOLE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.pihole
    environment:
      TZ: ${TZ:-Europe/Berlin}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_listeningMode: ALL
      FTLCONF_dns_upstreams: ${PIHOLE_UPSTREAM_DNS:-8.8.8.8;8.8.4.4}
    ports:
      - "127.0.0.1:53:53/tcp"
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:5080:80/tcp"
    volumes:
      - ./data/pihole/etc-pihole:/etc/pihole
    cap_add:
      - NET_ADMIN
      - SYS_TIME
    healthcheck:
      test: ["CMD", "dig", "+short", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
