# https://docs.pi-hole.net/docker/
# Network DNS ad blocker.
# setup.sh → .env.pihole (set LAB_HOST_IP), then: bash scripts/start.sh pihole
# Admin: http://127.0.0.1:5080/admin · Local DNS: *.network.lan → LAB_HOST_IP (see pihole/dns-hosts.conf)

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:${PIHOLE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.pihole
    environment:
      TZ: ${TZ:-Europe/Berlin}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_listeningMode: ALL
      FTLCONF_dns_upstreams: ${PIHOLE_UPSTREAM_DNS:-8.8.8.8;8.8.4.4}
      FTLCONF_dns_hosts: |-
        ${LAB_HOST_IP} jellyfin.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} n8n.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} seerr.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} it-tools.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} stirling.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} immich.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} odysseus.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} searxng.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} ntfy.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} postgres.${PIHOLE_LOCAL_DOMAIN:-network.lan}
        ${LAB_HOST_IP} pihole.${PIHOLE_LOCAL_DOMAIN:-network.lan}
    ports:
      - "127.0.0.1:53:53/tcp"
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:5080:80/tcp"
    volumes:
      - ./data/pihole/etc-pihole:/etc/pihole
    cap_add:
      - NET_ADMIN
      - SYS_TIME
    healthcheck:
      test: ["CMD", "dig", "+short", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
