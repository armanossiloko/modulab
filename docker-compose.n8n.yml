# https://docs.n8n.io/hosting/installation/server-setups/docker-compose/#5-create-local-files-directory
# Localhost only: open http://127.0.0.1:5678 (port bound to loopback).
# Persistence: ./data/n8n (app data) and ./data/n8n/files (binary/local files).

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    env_file:
      - .env.n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - TZ=${GENERIC_TIMEZONE:-UTC}
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/n8n-local-files:/files
