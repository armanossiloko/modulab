# https://docs.immich.app/install/docker-compose
# Self-hosted photos/videos — bundled Postgres (vector) + Valkey, not shared modulab-db.
# setup.sh → .env.immich, then: bash scripts/start.sh immich
# UI: http://127.0.0.1:2283 (loopback; change ports if you need LAN access)
# ML service is commented out (lower RAM). Enable smart search/faces: uncomment
# immich-machine-learning and disable unused jobs in Admin → Machine Learning.

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # nvenc, quicksync, rkmpp, vaapi, vaapi-wsl
    volumes:
      - ${UPLOAD_LOCATION}:/data
    env_file:
      - .env.immich
    ports:
      - "127.0.0.1:2283:2283"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: false

  # immich-machine-learning:
  #   container_name: immich_machine_learning
  #   image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
  #   # extends: # https://docs.immich.app/features/ml-hardware-acceleration
  #   #   file: hwaccel.ml.yml
  #   #   service: cpu # armnn, cuda, rocm, openvino, openvino-wsl, rknn
  #   volumes:
  #     - ./data/immich/model-cache:/cache
  #   env_file:
  #     - .env.immich
  #   restart: unless-stopped
  #   healthcheck:
  #     disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false
    restart: unless-stopped
