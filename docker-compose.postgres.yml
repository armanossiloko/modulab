# https://hub.docker.com/_/postgres
# Standalone database stack — start before any app that needs Postgres.
# Other stacks join network "modulab-db" (hostname: postgres).
# Persistence: ./data/postgres (Postgres 18+ cluster: ./data/postgres/18/docker/)
# Host: 127.0.0.1:5432

services:
  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modulab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modulab}
      POSTGRES_DB: ${POSTGRES_DB:-modulab}
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - modulab-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-bootstrap:
    image: postgres:18.4
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - modulab-db
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-modulab}
    volumes:
      - ./postgres/bootstrap.sql:/bootstrap.sql:ro
    entrypoint:
      - psql
      - -h
      - postgres
      - -U
      - ${POSTGRES_USER:-modulab}
      - -v
      - ON_ERROR_STOP=0
      - -f
      - /bootstrap.sql
    restart: "no"

networks:
  modulab-db:
    name: modulab-db
